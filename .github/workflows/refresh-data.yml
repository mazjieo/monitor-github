name: Refresh GitHub trend data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - data/github-trends.sqlite
      - public/data/trending.json
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-github-trends
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh data
        run: npm run refresh
        env:
          GITHUB_TOKEN: ${{ secrets.MONITOR_GITHUB_TOKEN }}
          BASELINE_MIN_STARS: 1000
          DISCOVERY_MIN_STARS: 1000
          GITHUB_SEARCH_DELAY_MS: 2200

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/github-trends.sqlite public/data/trending.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh GitHub trend data"
            git push
          fi

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
